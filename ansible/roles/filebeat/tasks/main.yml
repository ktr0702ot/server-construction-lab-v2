---
- name: ElasticのGPGキーを追加
  ansible.builtin.apt_key:
    url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
    state: present

- name: Elasticsearchリポジトリを追加
  ansible.builtin.apt_repository:
    repo: deb https://artifacts.elastic.co/packages/8.x/apt stable main
    state: present

- name: Filebeatをインストール
  ansible.builtin.apt:
    name: filebeat
    state: present
    update_cache: yes

- name: Filebeat設定ファイルを更新
  ansible.builtin.copy:
    content: |
      filebeat.inputs:
        - type: log
          enabled: true
          paths:
            - /var/log/*.log
            - /var/log/syslog

      output.elasticsearch:
        hosts: ["192.168.56.30:9200"]

      setup.kibana:
        host: "192.168.56.30:5601"
    dest: /etc/filebeat/filebeat.yml

- name: Filebeatを起動・自動起動設定
  ansible.builtin.systemd:
    name: filebeat
    state: started
    enabled: yes
    daemon_reload: yes