---
- name: prometheusユーザーを作成
  ansible.builtin.user:
    name: prometheus
    system: yes
    shell: /bin/false

- name: prometheus設定ディレクトリ作成
  ansible.builtin.file:
    path: /etc/prometheus
    state: directory
    owner: prometheus
    group: prometheus

- name: prometheusデータディレクトを作成
  ansible.builtin.file:
    path: /var/lib/prometheus
    state: directory
    owner: prometheus
    group: prometheus

- name: prometheusをダウンロード
  ansible.builtin.get_url:
    url: https://github.com/prometheus/prometheus/releases/download/v2.49.1/prometheus-2.49.1.linux-amd64.tar.gz
    dest: /tmp/prometheus.tar.gz

- name: prometheusを展開
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes

- name: prometheusバイナリをインストール
  ansible.builtin.copy:
    src: /tmp/prometheus-2.49.1.linux-amd64/prometheus
    dest: /usr/local/bin/prometheus
    mode: '0755'
    remote_src: yes

- name: prometheus設定ファイルを作成
  ansible.builtin.copy:
    content: |
      global:
        scrape_interval: 15s

      scrape_configs:
        - job_name: 'node'
          static_configs:
            - targets:
              - '192.168.56.10:9100'
              - '192.168.56.20:9100'
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus

- name: prometheusサービスファイルを作成
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=prometheus
      After=network.target

      [Service]
      User=prometheus
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus.service

- name: prometheusを起動・自動起動設定
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes
