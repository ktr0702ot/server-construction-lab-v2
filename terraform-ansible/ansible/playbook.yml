---
- name: 18.183.77.35の基本設定
  hosts: web
  become: yes

  tasks:
    - name: Nginxをインストール
      ansible.builtin.yum:
        name: nginx
        state: present

    - name: Nginxを起動・自動起動設定
      service:
        name: nginx
        state: started
        enabled: yes

    - name: カスタムHTMLを配置
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><title>Terraform + Ansibleだ！</title></head>
          <body>
            <h1>Hello from Terraform + Ansible だ！</h1>
            <p>上流工程にステップアップしたいよー</p>
          </body>
          </html>
        dest: /usr/share/nginx/html/index.html
